<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f5f4b">
  <meta name="description" content="Demo PWA de productividad por linea y turno.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-app.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Pulse OEE Demo</title>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__copy">
        <p class="eyebrow">Demo local instalable</p>
        <h1>Pulse OEE</h1>
        <p class="hero__text">
          Panel simple de productividad con datos inventados para Rolling y Bombos.
        </p>
      </div>
      <div class="hero__badge" id="installState">PWA lista</div>
    </header>

    <main class="content">
      <section class="panel panel--overview">
        <div class="section-head">
          <div>
            <p class="section-label">Resumen</p>
            <h2>Vista rapida del ultimo dia</h2>
          </div>
          <p class="mini-note" id="trendNote"></p>
        </div>
        <div class="chart-card">
          <div class="chart chart--compact" id="trendChart" aria-label="Comparativa del ultimo dia"></div>
        </div>
      </section>

      <div id="lineBoards" class="line-boards"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
